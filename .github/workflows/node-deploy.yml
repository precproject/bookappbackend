name: Deploy Node App to VPS
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.VPS_SSH_KEY }}
        known_hosts: 'just-a-placeholder-so-we-dont-get-errors'
        
    - name: Adding Known Hosts
      run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
    - name: Deploy to VPS using rsync
      run: rsync -avz --exclude 'node_modules' --exclude '.git' ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/backend/
      
    - name: Restart Node App via PM2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /var/www/backend/
          npm install --omit=dev
          
          pm2 describe api > /dev/null
          if [ $? -eq 0 ]; then
            pm2 restart api
          else
            pm2 start server.js --name api
          fi
          
          pm2 save

    - name: Configure Nginx for React + API
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          sudo bash -c 'cat > /etc/nginx/sites-available/default << "EOF"
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              root /var/www/frontend;

              index index.html;

              server_name _;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              # Backend API proxy
              location /api/ {
                  proxy_pass http://127.0.0.1:5001/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
              }
          }
          EOF'

          sudo nginx -t
          sudo systemctl restart nginx